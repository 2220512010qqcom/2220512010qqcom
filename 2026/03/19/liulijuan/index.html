        <h3 id="教学简介"><a href="#教学简介" class="headerlink" title="教学简介"></a>教学简介</h3><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line">主讲课程：高级机器学习、深度学习理论与应用、神经网络原理（研究生课程）</span><br><span class="line">指导研究生：已指导硕士研究生 25 人（其中 15 人已毕业，10 人在读），博士研究生 3 人</span><br><span class="line">教学理念：注重理论基础与实践相结合，鼓励跨学科创新研究</span><br><span class="line">教学风格：逻辑严谨，善于引导学生独立思考，培养学生解决复杂工程问题的能力</span><br><span class="line">教学任职：XX 大学计算机科学与技术学院教授、博士生导师，XX 重点实验室副主任</span><br></pre></td></tr></table></figure>

<h3 id="教学成果"><a href="#教学成果" class="headerlink" title="教学成果"></a>教学成果</h3><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line">教学获奖：2024 年获得“宝钢优秀教师奖”；2023 年被评为“XX 大学十佳研究生导师”；2022 年主讲的《深度学习理论与应用》被评为省级一流课程</span><br><span class="line">教材建设：主编研究生教材《深度学习：从基础到前沿》（XX 大学出版社，2025 年出版），参编国家级规划教材《人工智能导论》</span><br><span class="line">指导学生竞赛：指导学生团队获得 2024 年全国研究生人工智能创新大赛一等奖；2023 年中国国际“互联网+”大学生创新创业大赛银奖</span><br><span class="line">指导学生科研：近三年指导研究生在 NeurIPS、ICML、ICLR 等顶级会议和 IEEE TPAMI 等期刊发表论文 20 余篇；指导学生获得国家奖学金 8 人次，省级优秀硕士学位论文 3 篇</span><br><span class="line">人才培养：毕业研究生主要就职于阿里巴巴、腾讯、华为等知名企业和科研院所，获得用人单位高度评价</span><br></pre></td></tr></table></figure>
